<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Omniscient AI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#1e293b;border-radius:16px;border:1px solid #334155;padding:40px;width:340px}
  .logo{text-align:center;margin-bottom:28px}
  .logo h1{font-size:15px;font-weight:800;color:#f1f5f9;letter-spacing:.06em;text-transform:uppercase}
  .logo p{font-size:12px;color:#475569;margin-top:4px}
  label{display:block;font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:6px}
  input{width:100%;padding:10px 12px;margin-bottom:14px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;font-size:14px;color:#f1f5f9;outline:none;font-family:inherit;transition:border-color .15s}
  input:focus{border-color:#6366f1}
  button{width:100%;padding:11px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
  button:hover{background:#4f46e5}
  .error{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Omniscient AI</h1>
    <p>Administration</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <label>Mot de passe admin</label>
    <input type="password" name="password" required autofocus>
    <button type="submit">Accéder</button>
  </form>
</div>
</body>
</html>
