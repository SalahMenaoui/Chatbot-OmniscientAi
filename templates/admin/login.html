<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Omniscient AI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111111;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#1c1c1c;border-radius:20px;border:1px solid #2c2c2c;padding:44px 40px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
  .logo{text-align:center;margin-bottom:32px}
  .logo-mark{width:56px;height:56px;margin:0 auto 14px}
  .logo h1{font-size:19px;font-weight:800;color:#f1f5f9;letter-spacing:-.01em}
  .logo h1 span{color:#dc4545}
  .logo p{font-size:11px;color:#475569;margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
  label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  input{width:100%;padding:11px 14px;margin-bottom:14px;border:1.5px solid #2c2c2c;border-radius:10px;font-size:14px;color:#e2e8f0;background:#111111;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
  input:focus{border-color:#dc4545;box-shadow:0 0 0 3px rgba(220,69,69,.15)}
  button{width:100%;padding:12px;background:#dc4545;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
  button:hover{background:#b83535}
  .error{background:rgba(127,29,29,.5);color:#fca5a5;border:1px solid rgba(239,68,68,.3);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg class="logo-mark" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="28" fill="url(#ga)"/>
      <circle cx="28" cy="28" r="16" fill="url(#gb)" opacity=".7"/>
      <circle cx="28" cy="28" r="7"  fill="#7f1d1d" opacity=".8"/>
      <defs>
        <radialGradient id="ga" cx="45%" cy="38%" r="65%">
          <stop offset="0%" stop-color="#e87575"/>
          <stop offset="100%" stop-color="#dc4545" stop-opacity="0.25"/>
        </radialGradient>
        <radialGradient id="gb" cx="45%" cy="38%" r="65%">
          <stop offset="0%" stop-color="#b83535"/>
          <stop offset="100%" stop-color="#7f1d1d"/>
        </radialGradient>
      </defs>
    </svg>
    <h1>Omniscient<span>AI</span></h1>
    <p>Administration</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <label>Mot de passe</label>
    <input type="password" name="password" required autofocus autocomplete="current-password" placeholder="••••••••">
    <button type="submit">Accéder →</button>
  </form>
</div>
</body>
</html>
