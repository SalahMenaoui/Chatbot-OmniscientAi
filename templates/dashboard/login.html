<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion — Omniscient AI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:20px;border:1px solid #e2e8f0;padding:44px 40px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.07)}
  .logo{text-align:center;margin-bottom:32px}
  .logo-mark{width:52px;height:52px;margin:0 auto 14px}
  .logo h1{font-size:19px;font-weight:800;color:#0f172a;letter-spacing:-.01em}
  .logo h1 span{color:#dc4545}
  .logo p{font-size:12px;color:#94a3b8;margin-top:4px;letter-spacing:.04em}
  label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  input{width:100%;padding:11px 14px;margin-bottom:14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
  input:focus{border-color:#dc4545;box-shadow:0 0 0 3px rgba(220,69,69,.12)}
  button{width:100%;padding:12px;background:#dc4545;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
  button:hover{background:#b83535}
  .error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg class="logo-mark" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="26" fill="url(#da)"/>
      <circle cx="26" cy="26" r="15" fill="url(#db)" opacity=".65"/>
      <circle cx="26" cy="26" r="6"  fill="#7f1d1d" opacity=".7"/>
      <defs>
        <radialGradient id="da" cx="45%" cy="38%" r="65%">
          <stop offset="0%" stop-color="#e87575"/>
          <stop offset="100%" stop-color="#dc4545" stop-opacity="0.25"/>
        </radialGradient>
        <radialGradient id="db" cx="45%" cy="38%" r="65%">
          <stop offset="0%" stop-color="#b83535"/>
          <stop offset="100%" stop-color="#7f1d1d"/>
        </radialGradient>
      </defs>
    </svg>
    <h1>Omniscient<span>AI</span></h1>
    <p>Dashboard client</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <label>Email</label>
    <input type="email" name="email" required autofocus autocomplete="email">
    <label>Mot de passe</label>
    <input type="password" name="password" required autocomplete="current-password">
    <button type="submit">Se connecter →</button>
  </form>
</div>
</body>
</html>
