<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion — Omniscient AI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:40px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  .logo{text-align:center;margin-bottom:28px}
  .logo h1{font-size:17px;font-weight:800;color:#0f172a;letter-spacing:-.01em}
  .logo p{font-size:13px;color:#64748b;margin-top:4px}
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
  input{width:100%;padding:10px 12px;margin-bottom:14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
  input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  button{width:100%;padding:11px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
  button:hover{background:#4f46e5}
  .error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Omniscient AI</h1>
    <p>Dashboard client</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <label>Email</label>
    <input type="email" name="email" required autofocus autocomplete="email">
    <label>Mot de passe</label>
    <input type="password" name="password" required autocomplete="current-password">
    <button type="submit">Se connecter</button>
  </form>
</div>
</body>
</html>
